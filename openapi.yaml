    github_com_rixlhq_api_internal_videos_handler_upload.CompleteRequest:
      properties:
        video_id:
          example: VI9VXQxWXQ
          type: string
      type: object
    github_com_rixlhq_api_internal_videos_handler_upload.InitResponse:
      properties:
        poster_id:
          example: PS5IMKoFLm
          type: string
        poster_presigned_url:
