components:
  schemas:
    AudioTrack:
      properties:
        created_at:
          example: "2025-12-21T12:00:00Z"
          type: string
        format:
          example: mp3
          type: string
        id:
          example: 3n7v9k4m2p
          type: string
        label:
          example: Spanish
          type: string
        language_code:
          example: es-ES
          type: string
        name:
          example: spanish_audio.mp3
          type: string
        size:
          example: 2048576
          type: integer
        url:
          example: https://cdn.rixl.io/audio_tracks/project_id/video_id/es-ES-3n7v9k4m2p.mp3
          type: string
        video_id:
          example: x8n2p5v9k7
          type: string
      type: object
    AudioTrackDelete:
      properties:
        message:
          example: Audio track deleted
          type: string
        status:
          example: ok
          type: string
      type: object
    Chapter:
      properties:
        duration_label:
          example: "02:25"
          type: string
        end_time_sec:
          example: 145
          type: number
        start_time_sec:
          example: 0
          type: number
        title:
          example: Introduction
          type: string
      type: object
    File:
      properties:
        created_at:
          example: "2025-01-01T00:00:00Z"
          type: string
        format:
          example: avif
          type: string
        id:
          example: FpvLwyDMqu
          type: string
        name:
          example: original.jpeg
          type: string
        project_id:
          example: Bq4y3QB38S
          type: string
        size:
          example: 1048576
          type: integer
        status:
          $ref: '#/components/schemas/FileStatus'
          example: ready
        updated_at:
          example: "2025-01-01T00:00:00Z"
          type: string
        url:
          example: https://images.rixl.com/Bq4y3QB38S/FpvLwyDMqu
          type: string
      type: object
    FileStatus:
      enum:
      - uploading
      - uploaded
      - processing
      - preparing
      - ready
      - error
      type: string
      x-enum-comments:
        FileStatusError: error happened, file is corrupt
        FileStatusProcessing: asset is currently processing Other
        FileStatusReady: file is ready to consume
        FileStatusUploaded: upload finished
        FileStatusUploading: upload is currently happening
      x-enum-varnames:
      - FileStatusUploading
      - FileStatusUploaded
      - FileStatusProcessing
      - FileStatusPreparing
      - FileStatusReady
      - FileStatusError
    Image:
      properties:
        attached_to_video:
          example: false
          type: boolean
        file:
          $ref: '#/components/schemas/File'
        height:
          example: 1080
          type: integer
        id:
          example: PS5IMKoFLm
          type: string
        thumbhash:
          example: 1QcSHQRnh493V4dIh4eXh1h4kJUI
          type: string
        width:
          example: 1920
          type: integer
      type: object
    Post:
      properties:
        created_at:
          example: "2025-01-01T00:00:00Z"
          type: string
        creator_id:
          example: CR8y3QB38S
          type: string
        description:
          example: My awesome post
          type: string
        feed_id:
          example: FD4y3QB38S
          type: string
        id:
          example: PS5IMKoFLm
          type: string
        image:
          $ref: '#/components/schemas/Image'
        plan_type:
          $ref: '#/components/schemas/github_com_rixlhq_api_db_sqlc.PlanType'
          example: free
        type:
          $ref: '#/components/schemas/PostType'
          example: video
        updated_at:
          example: "2025-01-01T00:00:00Z"
          type: string
        video:
          $ref: '#/components/schemas/github_com_rixlhq_api_internal_videos.VideoResponse'
      type: object
    PostType:
      enum:
      - image
      - video
      type: string
      x-enum-varnames:
      - PostTypeImage
      - PostTypeVideo
    Subtitle:
      properties:
        created_at:
          example: "2025-12-21T12:00:00Z"
          type: string
        id:
          example: 5m9k8p2v7q
          type: string
        label:
          example: English
          type: string
        language_code:
          example: en-US
          type: string
        name:
          example: english_subs.srt
          type: string
        size:
          example: 1024
          type: integer
        url:
          example: https://cdn.rixl.io/subtitles/project_id/video_id/en-US-5m9k8p2v7q.srt
          type: string
        video_id:
          example: x8n2p5v9k7
          type: string
      type: object
    SubtitleDelete:
      properties:
        message:
          example: Subtitle deleted
          type: string
        status:
          example: ok
          type: string
      type: object
    UpdateChaptersRequest:
      properties:
        chapters:
          items:
            $ref: '#/components/schemas/github_com_rixlhq_api_internal_videos_types.ChapterInput'
          type: array
          uniqueItems: false
      type: object
    UpdateChaptersResponse:
      properties:
        chapters:
          items:
            $ref: '#/components/schemas/Chapter'
          type: array
          uniqueItems: false
        video_id:
          example: x8n2p5v9k7
          type: string
      type: object
    Video:
      properties:
        bitrate:
          type: integer
        chapters:
          items:
            $ref: '#/components/schemas/Chapter'
          type: array
          uniqueItems: false
        codec:
          type: string
        duration:
          type: number
        file:
          $ref: '#/components/schemas/File'
        framerate:
          type: string
        hdr:
          type: boolean
        height:
          type: integer
        id:
          type: string
        plan_type:
          $ref: '#/components/schemas/github_com_rixlhq_api_db_sqlc.PlanType'
          example: free
        poster:
          $ref: '#/components/schemas/Image'
        width:
          type: integer
      type: object
    VideoUploadInitRequest:
      properties:
        file_name:
          example: my-video.mp4
          type: string
        image_format:
          example: jpg
          type: string
        video_quality:
          $ref: '#/components/schemas/github_com_rixlhq_api_db_sqlc.VideoQuality'
          example: shorts
      required:
      - file_name
      type: object
    github_com_rixlhq_api_db_sqlc.PlanType:
      enum:
      - free
      - pro
      - custom
      - pay_as_you_go
      type: string
      x-enum-varnames:
      - PlanTypeFree
      - PlanTypePro
      - PlanTypeCustom
      - PlanTypePayAsYouGo
    github_com_rixlhq_api_db_sqlc.VideoQuality:
      enum:
