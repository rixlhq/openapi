        created_at:
          type: string
        duration:
          type: number
        height:
          type: integer
        id:
          type: string
        name:
          type: string
        size:
          type: integer
        visibility:
          $ref: '#/components/schemas/videosv1.Visibility'
        width:
          type: integer
      type: object
    videosv1.VideoUploadInit:
      properties:
        expires_at:
          type: string
        poster_id:
          type: string
        poster_upload_url:
          type: string
        video_id:
          type: string
        video_upload_url:
          type: string
      type: object
    videosv1.Visibility:
      enum:
      - 0
      - 1
      - 2
      - 3
      type: integer
      x-enum-varnames:
      - Visibility_VISIBILITY_UNSPECIFIED
      - Visibility_VISIBILITY_PUBLIC
      - Visibility_VISIBILITY_UNLISTED
      - Visibility_VISIBILITY_PRIVATE
  securitySchemes:
    Bearer:
      in: header
      name: X-API-Key
      type: apiKey
