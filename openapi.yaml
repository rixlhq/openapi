        name:
          type: string
      type: object
    pagination.PaginatedResponse-Image:
      properties:
        data:
          description: Data contains the slice of items for the current request.
          items:
            $ref: '#/components/schemas/Image'
          type: array
          uniqueItems: false
        pagination:
          $ref: '#/components/schemas/pagination.Pagination'
          description: Pagination data for the request.
      type: object
    pagination.PaginatedResponse-Post:
      properties:
        data:
          description: Data contains the slice of items for the current request.
          items:
            $ref: '#/components/schemas/Post'
          type: array
          uniqueItems: false
        pagination:
          $ref: '#/components/schemas/pagination.Pagination'
          description: Pagination data for the request.
      type: object
    pagination.PaginatedResponse-Video:
      properties:
        data:
          description: Data contains the slice of items for the current request.
          items:
            $ref: '#/components/schemas/Video'
          type: array
          uniqueItems: false
        pagination:
          $ref: '#/components/schemas/pagination.Pagination'
          description: Pagination data for the request.
      type: object
    pagination.Pagination:
      properties:
        limit:
          default: 25
          description: Maximum number of items to return in a single request.
          example: 100
          maximum: 100
          minimum: 1
          type: integer
        offset:
          default: 0
          description: Starting point of the result set.
          example: 50
          minimum: 0
          type: integer
        total:
          description: The total number of available items in the full list.
          example: 1000
          minimum: 0
          type: integer
      type: object
  securitySchemes:
    ApiKeyAuth:
      description: Internal API key for service-to-service communication.
      in: header
      name: X-API-Key
      type: apiKey
    Bearer:
      description: Type "Bearer" followed by a space and JWT token.
      in: header
      name: Authorization
      type: apiKey
externalDocs:
  description: ""
  url: ""
info:
  contact:
    email: support@rixl.com
    name: RIXL Support
    url: https://rixl.com/support
  description: |-
    **Build a powerful video experience from on-demand streaming to dynamic social feeds with a single API.**

    RIXL handles video processing, ingestion and global delivery so you don't have to.
    With builtin support for transcoding, storage and structured media feeds, Our API makes it easy to deliver high-quality media content at scale.
  license:
    name: All Rights Reserved
    url: https://rixl.com/terms-of-service
  title: RIXL API
  version: "2.0"
openapi: 3.1.0
paths:
  /feeds/{feedId}:
    get:
      description: Retrieve posts in a feed, with pagination.
      parameters:
      - description: Feed ID
        example: F4edRI23XL
        in: path
        name: feedId
        required: true
        schema:
          type: string
      - description: Maximum number of items to return in a single request. <br> **Default:**
          `25`
        example: 25
        in: query
        name: limit
        schema:
          default: 25
          maximum: 100
          minimum: 1
          type: integer
      - description: Starting point of the result set. <br>To get page 2 with a limit
          of 25, set `offset` to `25`. <br> **Default:** `0`
        example: 0
        in: query
        name: offset
        schema:
          default: 0
          minimum: 0
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pagination.PaginatedResponse-Post'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_rixlhq_api_internal_errors.ErrorResponse'
          description: Invalid feed ID or query parameters
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_rixlhq_api_internal_errors.ErrorResponse'
          description: Internal server error
      summary: List posts in a feed
      tags:
      - Feeds
  /feeds/{feedId}/{postId}:
    get:
      description: Retrieve a post from feed by its ID
      parameters:
      - description: Feed ID
        example: F4edRI23XL
        in: path
        name: feedId
        required: true
        schema:
          type: string
      - description: Post ID
        example: P5stRI23XL
        in: path
        name: postId
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_rixlhq_api_internal_errors.ErrorResponse'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_rixlhq_api_internal_errors.ErrorResponse'
          description: Not Found
      summary: Get a post
      tags:
      - Feeds
  /feeds/{feedId}/creators/{creatorId}:
    get:
      description: Retrieve posts in a feed by a specific creator, with pagination.
      parameters:
      - description: Feed ID
        example: F4edRI23XL
        in: path
        name: feedId
        required: true
        schema:
          type: string
      - description: Creator ID
        example: C6rtRI23XL
        in: path
        name: creatorId
        required: true
        schema:
          type: string
      - description: Maximum number of items to return in a single request. <br> **Default:**
          `25`
        example: 25
        in: query
        name: limit
        schema:
          default: 25
          maximum: 100
          minimum: 1
          type: integer
      - description: Starting point of the result set. <br>To get page 2 with a limit
          of 25, set `offset` to `25`. <br> **Default:** `0`
        example: 0
        in: query
        name: offset
        schema:
          default: 0
          minimum: 0
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pagination.PaginatedResponse-Post'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_rixlhq_api_internal_errors.ErrorResponse'
          description: Invalid feed ID, creator ID, or query parameters
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_rixlhq_api_internal_errors.ErrorResponse'
          description: Internal server error
      summary: List posts by creator
      tags:
      - Feeds
  /images:
    get:
      description: Retrieve all images for a specific project, with pagination and
        sorting.
      parameters:
      - description: Maximum number of items to return in a single request. <br> **Default:**
          `25`
        example: 25
        in: query
        name: limit
        schema:
          default: 25
          maximum: 100
          minimum: 1
          type: integer
      - description: Starting point of the result set. <br>To get page 2 with a limit
          of 25, set `offset` to `25`. <br> **Default:** `0`
        example: 0
        in: query
        name: offset
        schema:
          default: 0
          minimum: 0
          type: integer
      - description: Field to sort by (created_at, name, size, updated_at)
        example: created_at
        in: query
        name: sort
        schema:
          type: string
      - description: Sort order (asc, desc)
        example: desc
        in: query
        name: order
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pagination.PaginatedResponse-Image'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_rixlhq_api_internal_errors.ErrorResponse'
          description: Invalid query parameters
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_rixlhq_api_internal_errors.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_rixlhq_api_internal_errors.ErrorResponse'
          description: Forbidden
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_rixlhq_api_internal_errors.ErrorResponse'
          description: Internal server error
      security:
      - ApiKeyAuth: []
      summary: List images for a project
      tags:
      - Images
      x-order: 2
  /images/{imageId}:
    delete:
      description: delete an image by marking it as deleted
      parameters:
      - description: Image ID
        example: M1uxRI23XL
        in: path
        name: imageId
        required: true
        schema:
          type: string
      responses:
        "204":
          description: Image deleted successfully
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_rixlhq_api_internal_errors.ErrorResponse'
          description: Invalid project ID or image ID
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_rixlhq_api_internal_errors.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_rixlhq_api_internal_errors.ErrorResponse'
          description: Access denied
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_rixlhq_api_internal_errors.ErrorResponse'
          description: Image not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_rixlhq_api_internal_errors.ErrorResponse'
          description: Failed to delete image
      security:
      - ApiKeyAuth: []
      summary: Delete image
      tags:
      - Images
      x-order: 5
    get:
      description: Retrieve an image by its ID for a specific project.
      parameters:
      - description: Image ID
        example: M1uxRI23XL
        in: path
        name: imageId
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_rixlhq_api_internal_errors.ErrorResponse'
          description: Invalid image ID
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_rixlhq_api_internal_errors.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_rixlhq_api_internal_errors.ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_rixlhq_api_internal_errors.ErrorResponse'
          description: Image not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_rixlhq_api_internal_errors.ErrorResponse'
          description: Internal server error
      security:
      - ApiKeyAuth: []
      summary: Get image
      tags:
      - Images
      x-order: 1
  /images/upload/complete:
    post:
      description: Complete the upload process and create the image record using API
        key authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/internal_images_handler.completeRequest'
              description: Upload completion request
              summary: request
        description: Upload completion request
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_rixlhq_api_internal_errors.ErrorResponse'
          description: Invalid request body
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_rixlhq_api_internal_errors.ErrorResponse'
          description: Unauthorized - Invalid API key
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_rixlhq_api_internal_errors.ErrorResponse'
          description: Access denied
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_rixlhq_api_internal_errors.ErrorResponse'
          description: File not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_rixlhq_api_internal_errors.ErrorResponse'
          description: Failed to complete upload or create image
      security:
      - ApiKeyAuth: []
      summary: 'Upload: Mark as complete'
      tags:
      - Images
      x-order: 4
  /images/upload/init:
    post:
      description: Initialize a presigned URL upload for an image file using API key
        authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/internal_images_handler.uploadInitRequest'
              description: Upload initialization request
              summary: request
        description: Upload initialization request
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_images_handler.initResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_rixlhq_api_internal_errors.ErrorResponse'
          description: Invalid request body
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_rixlhq_api_internal_errors.ErrorResponse'
